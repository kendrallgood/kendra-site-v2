---
layout: kendra_default_no_footer
---
<div class="exodus-scrapbook">
  <section class="exodus-hero" id="exodus-hero">
    <div class="exodus-floaters">
      <img class="exodus-floater exodus-floater--memphis" src="{{ '/assets/images/projects/exodus/scrapbook/memphis-pattern.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--wordmark" src="{{ '/assets/images/projects/exodus/scrapbook/logo-transparent.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--ink" src="{{ '/assets/images/projects/exodus/scrapbook/round-ink.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--sketch" src="{{ '/assets/images/projects/exodus/scrapbook/original-man-sketch.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--linewarp" src="{{ '/assets/images/projects/exodus/scrapbook/line-warp.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--splatter" src="{{ '/assets/images/projects/exodus/scrapbook/splatter.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--sticker" src="{{ '/assets/images/projects/exodus/scrapbook/logo-color.webp' | relative_url }}" alt="">
      <img class="exodus-floater exodus-floater--cutout" src="{{ '/assets/images/projects/exodus/scrapbook/jacob-cutout.webp' | relative_url }}" alt="">
    </div>

    <button class="exodus-hero__book" type="button" aria-label="Open Exodus Unseen" id="exodus-open-btn">
      <img class="exodus-hero__cover" src="{{ '/assets/images/projects/exodus/scrapbook/cover.webp' | relative_url }}" alt="Exodus Unseen — closed book cover">
    </button>
    <p class="exodus-hero__hint">click to open</p>
  </section>

  <section class="exodus-book-wrap" id="exodus-book-wrap" hidden>
    <button class="exodus-book__close" type="button" aria-label="Close book" id="exodus-close-btn">&times; close</button>
    <div id="exodus-flipbook"></div>
  </section>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/css/page-flip.css">
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
  var exodusPageUrls = [];
  var exodusPagePrefix = '{{ "/assets/images/projects/exodus/book-pages-split/page-" | relative_url }}';
  for (var i = 1; i <= 32; i++) {
    var num = i < 10 ? '00' + i : (i < 100 ? '0' + i : i);
    exodusPageUrls.push(exodusPagePrefix + num + '.jpg');
  }
</script>
<script src="{{ '/assets/js/exodus-book.js' | relative_url }}"></script>
